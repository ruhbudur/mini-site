<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Kod & Araç</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #e4e4e4;
      padding: 2rem;
    }
    .container { max-width: 900px; margin: 0 auto; }
    nav {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    }
    nav a {
      display: block;
      padding: 1.2rem 1.5rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(0,217,255,0.3);
      border-radius: 12px;
      color: #00d9ff;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s, transform 0.2s;
    }
    nav a:hover {
      background: rgba(0,217,255,0.15);
      transform: translateY(-2px);
    }
    footer { margin-top: 3rem; font-size: 0.9rem; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a href="kod-parcaciklari.html">Kod Parçacığı Arşivi</a>
      <a href="minik-oyunlar.html">Canlı Kod Oyunları</a>
      <a href="proje-fikirleri.html">Proje Fikirleri</a>
      <a href="arac-kutusu.html">Kendi Araç Kutusu</a>
    </nav>
    <footer>GitHub Pages · ruhbudur/mini-site</footer>
  </div>
</body>
</html>
