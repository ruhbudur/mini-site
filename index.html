<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bakımda</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; pointer-events: none;
    }
    .overlay h1 {
      font-family: system-ui, sans-serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 800;
      color: #dc2626;
      text-shadow: 0 0 20px rgba(220,38,38,0.8), 0 0 40px rgba(220,38,38,0.5);
      letter-spacing: 0.15em;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="overlay"><h1>BAKIM YAPILIYOR</h1></div>
  <script>
    var c = document.getElementById("canvas");
    var ctx = c.getContext("2d");
    function resize() { c.width = window.innerWidth; c.height = window.innerHeight; }
    window.onresize = resize;
    resize();
    var chars = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ<>/{}[]=+";
    var f = 16;
    var cols = Math.floor(c.width / f);
    var drops = [];
    for (var i = 0; i < cols; i++) drops[i] = Math.random() * 50;
    function draw() {
      ctx.fillStyle = "rgba(0,0,0,0.06)";
      ctx.fillRect(0, 0, c.width, c.height);
      ctx.fillStyle = "#22c55e";
      ctx.font = f + "px monospace";
      for (var i = 0; i < drops.length; i++) {
        var t = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(t, i * f, drops[i] * f);
        if (drops[i] * f > c.height && Math.random() > 0.97) drops[i] = 0;
        else drops[i]++;
      }
    }
    setInterval(draw, 45);
  </script>
</body>
</html>
